<div class="maxcontent-modal-votos" >
  <h1 *ngIf="indexJ==-1" class="pop-title-modal" >Total de votos</h1>
  <h1 *ngIf="indexJ>-1" class="pop-title-modal" >Voto preferencial</h1>
  <div class="content-modal-votos" >
    <div [ngClass]="((indexI==0 && indexJ==-1) || (indexI==votos.length-1)) && systemValue === '' ? 'min valVoto2 gris-desabilitado':'min valVoto2'" >
      <div class="imgBox2" fxLayout="row" fxLayoutAlign="center center">
        <img alt="" class="img-voto2" [src]="desabilitarAccion ? '../../../../../assets/loader/loader.svg': filePng" />
      </div>
      <form [formGroup]="formGroup" autocomplete="off">
        <mat-form-field appearance="outline" class="borde-azul">
          <input matInput formControlName="inputValueForm" #voteInput

                 (blur)="onBlur()" (focus)="onFocus()"
                 [readonly] = " systemValue === '' || fileId == null || fileId ==-1 || filePng == '' || !isEditable ? true : false"
                 maxlength="3" sceNumerosHash
          />
        </mat-form-field>
      </form>
    </div>

  </div>



  <div class="d-flex center-flex gap-10" >
    <button class="estilo3 m-0" (click)="cerrar()">CERRAR</button>
    <button [disabled]="desabilitarAccion || (indexI==0 && indexJ==-1)" class="estilo2 m-0" (click)="atras()">ATRAS</button>
    <button [disabled]="desabilitarAccion || (indexI==votos.length-1)"  class="estilo1 m-0"  (click)="siguiente()" >SIGUIENTE</button>
  </div>
</div>
