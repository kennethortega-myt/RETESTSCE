<section class="secciones">
  <h1 class="titulo1">Omisos vs Ausentismo</h1>
  <div class="conte_sombra p-20">
    <div class="filtros" [formGroup]="form">
      <div class="filtro">
        <label for="tipoProceso">Proceso:</label>

        <mat-form-field appearance="outline">
          <mat-select id="proceso" formControlName="proceso">
            <mat-option *ngFor="let proceso of listProceso"
                        [value]="proceso">{{proceso.nombre}}</mat-option>
          </mat-select>
        </mat-form-field>
      </div>
      <div class="filtro" style="display: none">
        <label for="eleccion">Elección:</label>
        <mat-form-field appearance="outline">
          <mat-select id="eleccion" formControlName="eleccion">
            <mat-option *ngFor="let eleccion of listEleccion" [value]="eleccion">
              {{eleccion.nombre}}
            </mat-option>
          </mat-select>
        </mat-form-field>
      </div>


      <div class="filtro">
        <label for="centroComputo">Centro de Cómputo:</label>
        <mat-form-field appearance="outline">
          <mat-select id="centroComputo" formControlName="centroComputo">
            <mat-option *ngFor="let centroComputo of listCentrosComputo" [value]="centroComputo">
              {{centroComputo.codigo}} - {{centroComputo.nombre}}
            </mat-option>
          </mat-select>
        </mat-form-field>
      </div>

      <div class="filtro">
        <label for="ambitoElectoral">ODPE:</label>
        <mat-form-field appearance="outline">
          <mat-select id="ambitoElectoral" formControlName="ambitoElectoral">
            <mat-option *ngFor="let ambitoElectoral of listOdpes" [value]="ambitoElectoral">
              {{ambitoElectoral.codigo}} - {{ambitoElectoral.nombre}}
            </mat-option>
          </mat-select>
        </mat-form-field>
      </div>

      <div class="filtro" style="display: none">
        <label for="tipoReporte">Tipo de Comparación:</label>
        <mat-form-field appearance="outline">
          <mat-select id="tipoReporte" formControlName="tipoReporte">
            <mat-option *ngFor="let tipoReporte of listTipoReporte" [value]="tipoReporte">
              {{tipoReporte.codigo}} {{tipoReporte.nombre}}
            </mat-option>
          </mat-select>
        </mat-form-field>
      </div>

      <div class="filtro_boton">
        <button class="estilo1 full noMarginLR" type="button" (click)="buscarReporte()">
          Consultar
        </button>
      </div>
    </div>
    <h2 class="subtitulo_reportes">Comparación Omisos Ausentismo</h2>
    <div class="cont-anuncio" *ngIf="mensaje">
      <app-mensaje-personaje [mensaje]="mensaje"></app-mensaje-personaje>
    </div>
    <article class="pdf_incrustado">
      <div class="contenedor-documento-muestra">
        <div #idDivImagen *ngIf="isShowReporte">
        </div>
      </div>
    </article>
