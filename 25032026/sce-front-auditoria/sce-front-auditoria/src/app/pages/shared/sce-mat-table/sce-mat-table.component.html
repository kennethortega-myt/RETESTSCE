<div class="scrolltablGeneral" [ngStyle]="{'height': 'calc(100vh - ' + heightOffset + 'px)'}">
  <table mat-table [dataSource]="dataSource" matSort class="mat-elevation-z8 scrollheadermon">
    <caption class="d-none"></caption>
    <!-- Columna de índice (opcional) -->
    <ng-container matColumnDef="index" *ngIf="addIndexColumn">
      <th mat-header-cell *matHeaderCellDef [ngStyle]="{'text-align': 'center','width': '5%'}" mat-sort-header>
        N°
      </th>
      <td mat-cell *matCellDef="let element" [ngStyle]="{'text-align': 'center','width': '5%'}">
        {{ element.index }}
      </td>
    </ng-container>
    <ng-container *ngFor="let column of columns" [matColumnDef]="column.key">
      <!-- Cabecera de la columna -->
      <ng-container *ngIf="enableSorting && !column.isAction; else noSortHeader">
        <th mat-header-cell *matHeaderCellDef [ngStyle]="{'width': column.width, 'text-align': column.headerAlign || 'left'}" mat-sort-header>
          {{ column.label }}
        </th>
      </ng-container>
      <ng-template #noSortHeader>
        <th mat-header-cell *matHeaderCellDef [ngStyle]="{'width': column.width, 'text-align': column.headerAlign || 'left'}">
          {{ column.label }}
        </th>
      </ng-template>
      <!-- Cuerpo de la columna -->
      <td mat-cell
          *matCellDef="let element"
          [ngStyle]="{'width': column.width, 'text-align': column.cellAlign || 'left'}">
        <ng-container *ngIf="!column.isAction; else actionTemplate">
          {{ element[column.key] }}
        </ng-container>
        <ng-template #actionTemplate>
          <ng-container *ngFor="let action of column.actions">
            <span [ngClass]="action.class"
                  (click)="emitAction(action.icon, element)" onkeypress="">{{action.icon}}</span>
          </ng-container>
        </ng-template>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

  </table>
  <div *ngIf="dataSource.data.length === 0" class="no-data-message">
    No se han encontrado registros.
  </div>
</div>
<mat-paginator [pageSize]="pageSize" [pageSizeOptions]="pageSizeOptions" showFirstLastButtons></mat-paginator>
