<div class="pop-content-actas-corregir">
  <div class="d-flex center-flex">
    <img alt="" *ngIf="icon==IconPopType.ALERT" class="img-pop" src="../assets/img/icon-pop/alerta.svg">
    <img alt="" *ngIf="icon==IconPopType.CONFIRM" class="img-pop" src="../assets/img/icon-pop/confirmacion.svg">
    <img alt="" *ngIf="icon==IconPopType.ERROR" class="img-pop" src="../assets/img/icon-pop/error.svg">
  </div>
  <h1 class="pop-title" >{{title}}</h1>
  <div class="table-container-pop-actas-corregir">
    <table mat-table [dataSource]="dataList" class="mat-elevation-z8">
      <caption class="d-none"></caption>
      <!-- Índice Column -->
      <ng-container matColumnDef="index">
        <th mat-header-cell *matHeaderCellDef> # </th>
        <td mat-cell *matCellDef="let element; let i = index">{{ i + 1 }}</td>
      </ng-container>

      <!-- Valor Column -->
      <ng-container matColumnDef="value">
        <th mat-header-cell *matHeaderCellDef> Observación </th>
        <td mat-cell *matCellDef="let element">{{ element }}</td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </div>
  <div class="d-flex center-flex gap-10 mt-12" >
    <button class="estilo3 m-0"  cdkFocusInitial mat-dialog-close *ngIf="questions">CANCELAR</button>
    <button class="estilo1 m-0"  cdkFocusInitial (click)="aceptar()">ACEPTAR</button>
  </div>
</div>
