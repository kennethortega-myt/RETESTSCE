<div cdkDrag cdkDragRootElement=".cdk-overlay-pane"
     style="display: flex; flex-direction: column; height: 100%;">
  <div class="d-flex" style="flex: 1; overflow: hidden;">
    <div class="w-100" style="position: relative; overflow: hidden;">

      <div *ngIf="cargandoPdf" class="centrar-spinner loading-overlay">
        <mat-spinner diameter="40"></mat-spinner>
      </div>
      <div style="position: relative; width: 100%; height: 100%;">
        <div #iframeOverlay
             style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;
                      display: none; z-index: 1;">
        </div>
        <iframe
          #iframeRef
          *ngIf="pdfUrl"
          [src]="pdfUrlSafe"
          (load)="onPdfCargado()"
          [style.opacity]="cargandoPdf ? '0' : '1'"
          width="100%"
          height="100%"
          style="border: none;"
          title="Resoluciones"
        ></iframe>
      </div>
      <div *ngIf="!pdfUrl" class="d-flex justify-content-center align-items-center h-100">
        <p class="text-muted">No hay PDF disponible para mostrar</p>
      </div>
    </div>
  </div>

  <div class="d-flex align-items j-end px-20 gap-10" style="padding-bottom: 16px; padding-top: 12px;">
    <button class="m-0 estilo2 mb-40" (click)="descargar()">DESCARGAR</button>
    <button class="m-0 estilo1 mb-40" (click)="cerrar()">CERRAR</button>
  </div>
</div>
