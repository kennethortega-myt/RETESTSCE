<div class="container-modal-resoluciones">
    <h3 class="titulo3 m-0">Resolución XXX-2023</h3>

    <table
      mat-table
      [dataSource]="dataSource2"
      class="mat-elevation-z8 mt-10 tableVerificacionModal"
    >
      <caption class="d-none"></caption>

      <ng-container matColumnDef="celda1">
        <th mat-header-cell *matHeaderCellDef>N°</th>
        <td mat-cell *matCellDef="let row">{{ row.celda1 }}</td>
      </ng-container>
      <ng-container matColumnDef="celda2" class="wide-column">
        <th mat-header-cell *matHeaderCellDef class="wide-column">
          Organizaciones Políticas
        </th>
        <td mat-cell *matCellDef="let row" class="wide-column">
          <div class="circle-blue-activo"></div>
        </td>
      </ng-container>

      <tr
        mat-header-row
        *matHeaderRowDef="displayedColumns2; sticky: true"
        class="header-row"
      ></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns2"></tr>
    </table>

    <div class="d-flex j-end mt-18">
        <button class="estilo2  m-0" type="button">ACEPTAR</button>

       </div>

</div>
