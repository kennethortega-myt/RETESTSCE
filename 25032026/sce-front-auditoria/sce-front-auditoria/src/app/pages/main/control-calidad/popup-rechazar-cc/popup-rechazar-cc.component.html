<div class="pop-content">
    <div class="d-flex center-flex">
        <img alt="" class="img-pop" src="../assets/img/icon-pop/alerta.svg">
    </div>
    <h1 class="pop-title2">Rechazar Control Calidad </h1>
    <div class="mt-20">
        <p class="texto-pop-observacion">Seleccionar resolución:</p>
        <ul class="lista-observaciones ml-menos7">
            <li *ngFor="let resol of datosRechazar.listaResoluciones">
                <mat-checkbox class="example-margin" 
                    (change)="changeCheckResolucion($event.checked, resol.idResolucion)">Número de resolución/memo 
                        <strong>{{resol.nombreResolucion}}</strong> no corresponde con la imagen digitalizada
                </mat-checkbox>
            </li>
        </ul>

    </div>
    <div class="mt-20">
        <p class="texto-pop-observacion">Para rechazar las resoluciones, se solicitará autorización a Nación.</p>
    </div>
    <div class="d-flex center-flex gap-10">
        <button class="estilo2 m-2" mat-dialog-close (click)="aceptarRechazar()">ACEPTAR</button>

        <button class="estilo1 m-2" mat-dialog-close (click)="cancelarRechazar()">CANCELAR</button>        
    </div>
</div>
