<mat-dialog-content class="mat-typography mt-12">
  <h3 class="titulo3">Observaciones (Acta) </h3>
  <article class="w-80">
    <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">
      <caption class="d-none"></caption>
      <ng-container matColumnDef="codigo">
        <th mat-header-cell *matHeaderCellDef>Codigo</th>
        <td mat-cell *matCellDef="let element">{{element.codigo}}</td>
      </ng-container>

      <ng-container matColumnDef="descripcion">
        <th mat-header-cell *matHeaderCellDef>Descripción</th>
        <td mat-cell *matCellDef="let element">{{element.descripcion}}</td>
      </ng-container>
      <ng-container matColumnDef="header-row-first-group">
        <th mat-header-cell *matHeaderCellDef [attr.colspan]="2">Provincial</th>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="['header-row-first-group']"></tr>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </article>
</mat-dialog-content>
<mat-dialog-actions class="mb-1" align="end">

  <button class="btn-azul mr-1"  (click)="aceptar()">ACEPTAR</button>

</mat-dialog-actions>
