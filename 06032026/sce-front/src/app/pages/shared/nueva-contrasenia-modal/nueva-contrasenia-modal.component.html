<section>
  <form [formGroup]="form" class="cuadro-blanco-2">
    <h1 class="titulo1">Cambiar contraseña</h1>

    <label for="nuevaContrasenaInput">Ingresa una nueva contraseña</label>
    <mat-form-field appearance="outline">
      <input matInput id="nuevaContrasenaInput" #nuevaContrasenaInput [type]="hideNueva() ? 'password' : 'text'" class="input"
        formControlName="nuevaContrasena" maxlength="20" />
      <button mat-icon-button matSuffix (click)="toggleCampo('nueva')" [attr.aria-pressed]="hideNueva()">
        <mat-icon>{{ hideNueva() ? 'visibility_off' : 'visibility' }}</mat-icon>
      </button>
    </mat-form-field>

    <app-validacion-contrasenia [contrasenia]="form.get('nuevaContrasena')?.value || ''"></app-validacion-contrasenia>

    <label for="confirmarContrasenaInput">Confirma tu contraseña</label>
    <mat-form-field appearance="outline">
      <input matInput id="confirmarContrasenaInput" [type]="hideConfirmar() ? 'password' : 'text'" class="input"
        formControlName="confirmarContrasena" maxlength="20" />
      <button mat-icon-button matSuffix (click)="toggleCampo('confirmar')" [attr.aria-pressed]="hideConfirmar()">
        <mat-icon>{{ hideConfirmar() ? 'visibility_off' : 'visibility' }}</mat-icon>
      </button>
    </mat-form-field>
    @if(!!mensajeError()){<h1 style="color: red;text-align: center;">{{ mensajeError() }}</h1>}
    <div class="actions">
      <input value="Cambiar Contraseña" target="_parent" type="button" (click)="actualizarContrasenia()"
        [disabled]="isLoading()" class="estilo1" />
    </div>
  </form>
</section>
