<section class="secciones" cdkDrag cdkDragRootElement=".cdk-overlay-pane">
  <div>
    <mat-tab-group class="tabs-iz" (selectedTabChange)="onTabChange($event)">
      <mat-tab label="Acta de Escrutinio"></mat-tab>
      <mat-tab *ngIf="tipoVista === VistaModalType.COMBINADA" label="Acta de Instalación y Sufragio"></mat-tab>
      <mat-tab *ngIf="tipoVista === VistaModalType.SEPARADA" label="Acta de Instalación"></mat-tab>
      <mat-tab *ngIf="tipoVista === VistaModalType.SEPARADA" label="Acta de Sufragio"></mat-tab>
    </mat-tab-group>

    <div class="w-100 contenedor-pdf" style="position: relative; overflow: hidden;">
      <div *ngIf="cargandoPdf" class="centrar-spinner loading-overlay">
        <mat-spinner diameter="40"></mat-spinner>
      </div>
      <iframe
        *ngIf="pdfActual"
        [src]="pdfActualSafe"
        (load)="onPdfCargado()"
        [style.opacity]="cargandoPdf ? '0' : '1'"
        width="100%"
        height="100%"
        style="border: none;"
      ></iframe>
      <div *ngIf="!pdfActual" class="d-flex justify-content-center align-items-center h-100">
        <p class="text-muted">No hay PDF disponible para mostrar</p>
      </div>
    </div>

    <div class="d-flex align-items gap-10 j-end">
      <button class="m-0 estilo2 mb-40" (click)="descargar()">DESCARGAR</button>
      <button class="m-0 estilo1 mb-40" cdkFocusInitial (click)="cerrar()">CERRAR</button>
    </div>

  </div>
</section>
