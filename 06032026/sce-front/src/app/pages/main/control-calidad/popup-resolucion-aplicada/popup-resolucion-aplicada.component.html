<div class="bg-white p-20">
    <mat-tab-group class="tabs-iz">
        <mat-tab label="Resolución">
            <app-data-resolucion [datosResolucion]="datosResolucion"></app-data-resolucion>
            <div class="docBox mt-20 " #idDivImagen id="idDivImagen"></div>
            <div class="d-flex j-end mt-18 cont-btn">
                <button type="button" class="estilo2 m-0 mr-1" (click)="descargarPdf()">DESCARGAR PDF </button>
                <button type="button" class="estilo2 m-0" mat-dialog-close>CERRAR </button>
            </div>
        </mat-tab>
        <mat-tab label="Resolución aplicada" *ngIf="showTabResolAplicada">
            <app-data-resolucion [datosResolucion]="datosResolucion"></app-data-resolucion>
            <div class=" mt-20" style="height: calc(100vh - 410px); overflow: auto;" (scroll)="onScroll($event)">
                <app-seccion-votos 
                    [dataPaso3]="dataPaso3"
                    [srcImgAgrupol]="srcImgAgrupol"
                    [srcImgVotos1]="srcImgVotos1"
                    [srcImgPreferenciales]="srcImgPreferenciales"
                    [isResolucionAplicada]="true"
                    [votosResolucionAplicada]="votosResolucionAplicada"
                    (revisoTodosPreferenciales)="revisoTodosPreferenciales($event)">
                </app-seccion-votos>
            </div>
            <div class="d-flex j-end mt-18 cont-btn">                
                <button type="button" class="estilo2 m-0" mat-dialog-close>CERRAR </button>
            </div>
        </mat-tab>
    </mat-tab-group>

</div>
